<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Интерактивный справочник паттернов барабанных машин из книги Pocket Operations">
<title>Pocket Operations — Drum Pattern Reference</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --bg2: #161618;
  --bg3: #1e1e21;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text2: #8a8880;
  --text3: #4a4845;
  --accent: #c8f050;
  --accent2: #7060f8;
  --radius: 10px;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

header {
  padding: 2rem 1.5rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
}
.logo { font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: .1em; text-transform: uppercase; }
.logo strong { display: block; font-size: 20px; color: var(--accent); letter-spacing: -.01em; font-family: var(--mono); margin-top: 2px; }
.header-count { font-family: var(--mono); font-size: 11px; color: var(--text3); }

/* BPM control in header */
.bpm-control {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--text2);
}
.bpm-control input[type=range] {
  width: 80px; accent-color: var(--accent);
}
.bpm-val { color: var(--accent); font-weight: 700; min-width: 32px; }

.toolbar {
  padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: .75rem;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg); z-index: 10;
}
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#search {
  width: 100%; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text); font-family: var(--mono); font-size: 13px; padding: 10px 40px 10px 38px;
  outline: none; transition: border-color .15s;
}
#search::placeholder { color: var(--text3); }
#search:focus { border-color: var(--accent); }
.clear-btn {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 18px; line-height: 1; padding: 2px; display: none;
}
.clear-btn.visible { display: block; }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 10px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; margin-right: 2px; flex-shrink: 0; }
.chip {
  font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border2); background: transparent; color: var(--text2);
  cursor: pointer; transition: all .12s; white-space: nowrap; letter-spacing: .04em;
}
.chip:hover { border-color: var(--text2); color: var(--text); }
.chip.active { background: var(--accent); border-color: var(--accent); color: #0e0e0f; font-weight: 700; }

main { padding: 1.25rem 1.5rem 5rem; }
.results-bar { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 1rem; letter-spacing: .06em; }

.patterns { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 8px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .15s; }
.card:hover { border-color: var(--border2); }
.card.open { border-color: var(--accent); }

.card-head {
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  cursor: pointer;
}
.card-left { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 2px; }
.genre-badge { font-family: var(--mono); font-size: 9px; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text3); white-space: nowrap; flex-shrink: 0; letter-spacing: .04em; }
.chevron { color: var(--text3); font-size: 14px; flex-shrink: 0; transition: transform .2s; font-family: var(--mono); }
.card.open .chevron { transform: rotate(180deg); color: var(--accent); }

.card-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
.card.open .card-body { display: block; }

/* PLAYER */
.player {
  display: flex; align-items: center; gap: 10px;
  margin-top: 12px; margin-bottom: 4px;
}
.play-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .12s;
  color: #0e0e0f;
}
.play-btn:hover { opacity: .85; }
.play-btn svg { width: 14px; height: 14px; }
.play-btn.playing { background: var(--text2); }

.step-indicators { display: flex; gap: 3px; flex: 1; align-items: center; }
.step-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--bg3); flex-shrink: 0; transition: background .05s;
}
.step-dot.bar { width: 8px; height: 8px; }
.step-dot.active { background: var(--accent); }

.drum-grid-wrap { overflow-x: auto; margin-top: 10px; padding-bottom: 4px; }
table.dg { border-collapse: collapse; font-family: var(--mono); font-size: 10px; }
table.dg .beat-header td { color: var(--text3); text-align: center; padding: 0 0 4px; width: 16px; font-size: 9px; }
table.dg .beat-header td:first-child { width: 28px; }
table.dg .row-label { color: var(--text2); text-align: right; padding-right: 8px; font-size: 10px; letter-spacing: .04em; }
.cell { width: 14px; height: 14px; border-radius: 3px; background: var(--bg3); margin: 1px; transition: background .04s; }
.cell.on { background: var(--accent); }
.cell.on.beat1 { background: #fff; }
.cell.playing-col { background: rgba(200,240,80,0.12); }
.cell.on.playing-col { background: #fff; filter: brightness(1.3); }
td { vertical-align: middle; }

.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
.tag { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border); color: var(--text3); }

.empty { text-align: center; padding: 4rem 0; color: var(--text3); font-family: var(--mono); font-size: 12px; grid-column: 1/-1; }
.empty span { font-size: 32px; display: block; margin-bottom: .5rem; }

footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--border);
  padding: .75rem 1.5rem; font-family: var(--mono); font-size: 9px; color: var(--text3);
  display: flex; justify-content: space-between; letter-spacing: .04em;
}

@media(max-width:600px){
  header { padding: 1.25rem 1rem .75rem; }
  .toolbar { padding: .75rem 1rem; }
  main { padding: 1rem 1rem 5rem; }
  .patterns { grid-template-columns: 1fr; }
  .bpm-control input[type=range] { width: 60px; }
}
</style>

<main>

</main>

<footer>
  <span>Based on Pocket Operations by Paul Wenzel</span>

</footer>

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
let ctx = null;
function getCtx(){
  if(!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended') ctx.resume();
  return ctx;
}

// Синтез каждого инструмента через Web Audio API
function synthKick(t, ac){
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(40, t+0.08);
  g.gain.setValueAtTime(1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.35);
  o.start(t); o.stop(t+0.36);
}
function synthSnare(t, ac){
  // noise layer
  const buf = ac.createBuffer(1, ac.sampleRate*0.15, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const bpf = ac.createBiquadFilter();
  bpf.type='bandpass'; bpf.frequency.value=2500; bpf.Q.value=0.8;
  const g = ac.createGain();
  src.connect(bpf); bpf.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
  src.start(t); src.stop(t+0.16);
  // tone layer
  const o = ac.createOscillator();
  const g2 = ac.createGain();
  o.connect(g2); g2.connect(ac.destination);
  o.frequency.value=200;
  g2.gain.setValueAtTime(0.5, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t+0.08);
  o.start(t); o.stop(t+0.09);
}
function synthHihat(t, ac, open){
  const dur = open ? 0.3 : 0.05;
  const buf = ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src = ac.createBufferSource();
  src.buffer = buf;
  const hpf = ac.createBiquadFilter();
  hpf.type='highpass'; hpf.frequency.value=open?7000:9000;
  const g = ac.createGain();
  src.connect(hpf); hpf.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(open?0.25:0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur*0.9);
  src.start(t); src.stop(t+dur);
}
function synthClap(t, ac){
  for(let i=0;i<3;i++){
    const delay = i*0.012;
    const buf = ac.createBuffer(1, ac.sampleRate*0.06, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
    const src = ac.createBufferSource(); src.buffer=buf;
    const bpf = ac.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=1200; bpf.Q.value=0.6;
    const g = ac.createGain();
    src.connect(bpf); bpf.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.5, t+delay);
    g.gain.exponentialRampToValueAtTime(0.001, t+delay+0.06);
    src.start(t+delay); src.stop(t+delay+0.07);
  }
}
function synthTom(t, ac, freq){
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(freq*0.5, t+0.12);
  g.gain.setValueAtTime(0.7, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
  o.start(t); o.stop(t+0.26);
}
function synthRimshot(t, ac){
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.frequency.value=800;
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.04);
  o.start(t); o.stop(t+0.05);
}
function synthCowbell(t, ac){
  const o1 = ac.createOscillator(), o2 = ac.createOscillator();
  const g = ac.createGain();
  o1.connect(g); o2.connect(g); g.connect(ac.destination);
  o1.frequency.value=562; o2.frequency.value=845;
  o1.type='square'; o2.type='square';
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.3);
  o1.start(t); o1.stop(t+0.31);
  o2.start(t); o2.stop(t+0.31);
}
function synthCymbal(t, ac){
  synthHihat(t, ac, true);
}
function synthShaker(t, ac){
  const buf = ac.createBuffer(1, ac.sampleRate*0.04, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src = ac.createBufferSource(); src.buffer=buf;
  const hpf = ac.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=8000;
  const g = ac.createGain();
  src.connect(hpf); hpf.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.04);
  src.start(t); src.stop(t+0.05);
}

function triggerInstrument(name, time, ac){
  switch(name){
    case 'BD': synthKick(time, ac); break;
    case 'SN': synthSnare(time, ac); break;
    case 'CH': synthHihat(time, ac, false); break;
    case 'OH': synthHihat(time, ac, true); break;
    case 'CL': synthClap(time, ac); break;
    case 'HT': synthTom(time, ac, 500); break;
    case 'MT': synthTom(time, ac, 320); break;
    case 'LT': synthTom(time, ac, 180); break;
    case 'RS': synthRimshot(time, ac); break;
    case 'CB': synthCowbell(time, ac); break;
    case 'CY': synthCymbal(time, ac); break;
    case 'SH': synthShaker(time, ac); break;
    default:   synthHihat(time, ac, false); break;
  }
}

// ─── SEQUENCER ───────────────────────────────────────────────────────────────
let bpm = 90;
let playingCardId = null;
let currentStep = 0;
let scheduleTimer = null;
let nextStepTime = 0;
const LOOKAHEAD = 0.1;
const SCHEDULE_INTERVAL = 40;

function stepDuration(){ return (60/bpm)/4; } // 16ths

function scheduleStep(inst, step, time, ac){
  Object.entries(inst).forEach(([name, steps])=>{
    if(steps.includes(step)) triggerInstrument(name, time, ac);
  });
}

function scheduleLoop(){
  if(playingCardId === null) return;
  const ac = getCtx();
  while(nextStepTime < ac.currentTime + LOOKAHEAD){
    const p = getPlayingPattern();
    if(p) scheduleStep(p.inst, currentStep+1, nextStepTime, ac);
    highlightStep(currentStep);
    currentStep = (currentStep+1) % 16;
    nextStepTime += stepDuration();
  }
  scheduleTimer = setTimeout(scheduleLoop, SCHEDULE_INTERVAL);
}

function getPlayingPattern(){
  return PATTERNS[playingCardId] || null;
}

function highlightStep(step){
  requestAnimationFrame(()=>{
    const card = document.querySelector(`.card[data-id="${playingCardId}"]`);
    if(!card) return;
    card.querySelectorAll('.step-dot').forEach((d,i)=>{
      d.classList.toggle('active', i===step);
    });
    // highlight column in grid
    card.querySelectorAll('table.dg').forEach(tbl=>{
      tbl.querySelectorAll('tr').forEach(row=>{
        const cells = row.querySelectorAll('td');
        cells.forEach((td,ci)=>{
          if(ci===0) return;
          const div = td.querySelector('.cell');
          if(div){
            div.classList.toggle('playing-col', ci-1===step);
          }
        });
      });
    });
  });
}

function stopPlayback(){
  if(scheduleTimer){ clearTimeout(scheduleTimer); scheduleTimer=null; }
  if(playingCardId !== null){
    const old = document.querySelector(`.card[data-id="${playingCardId}"]`);
    if(old){
      old.querySelectorAll('.step-dot').forEach(d=>d.classList.remove('active'));
      old.querySelectorAll('.cell').forEach(c=>c.classList.remove('playing-col'));
      const btn = old.querySelector('.play-btn');
      if(btn) btn.classList.remove('playing');
    }
  }
  playingCardId = null;
  currentStep = 0;
}

function togglePlay(cardId, event){
  event.stopPropagation();
  const ac = getCtx();
  if(playingCardId === cardId){
    stopPlayback();
    return;
  }
  stopPlayback();
  playingCardId = cardId;
  currentStep = 0;
  nextStepTime = ac.currentTime + 0.05;
  const btn = document.querySelector(`.card[data-id="${cardId}"] .play-btn`);
  if(btn) btn.classList.add('playing');
  scheduleLoop();
}

function updateBpm(v){
  bpm = parseInt(v);
  document.getElementById('bpm-val').textContent = v;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
const GENRES = [...new Set(PATTERNS.map(p=>p.genre))];
let activeGenre = 'all';
let activeMoods = new Set();
let openCardId = null;

document.getElementById('total-count').textContent = PATTERNS.length + ' паттернов';
document.getElementById('footer-count').textContent = PATTERNS.length + ' patterns';

const gc = document.getElementById('genre-chips');
gc.innerHTML = `<button class="chip active" onclick="setGenre('all',this)">Все</button>` +
  GENRES.map(g=>`<button class="chip" onclick="setGenre('${g}',this)">${g}</button>`).join('');

function setGenre(g,el){
  activeGenre=g;
  document.querySelectorAll('#genre-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}
function toggleMood(el){
  const m=el.dataset.mood;
  if(activeMoods.has(m)){activeMoods.delete(m);el.classList.remove('active');}
  else{activeMoods.add(m);el.classList.add('active');}
  render();
}
function onSearch(){
  const v=document.getElementById('search').value;
  document.getElementById('clear-btn').classList.toggle('visible',v.length>0);
  render();
}
function clearSearch(){
  document.getElementById('search').value='';
  document.getElementById('clear-btn').classList.remove('visible');
  render();
}

function drawGrid(inst){
  const rows=Object.keys(inst);
  let t='<table class="dg"><thead><tr class="beat-header"><td></td>';
  for(let i=1;i<=16;i++) t+=`<td>${i}</td>`;
  t+='</tr></thead><tbody>';
  rows.forEach(r=>{
    const hits=new Set(inst[r]);
    t+=`<tr><td class="row-label">${r}</td>`;
    for(let i=1;i<=16;i++){
      t+=`<td><div class="cell${hits.has(i)?' on':''}${hits.has(i)&&i===1?' beat1':''}"></div></td>`;
    }
    t+='</tr>';
  });
  return t+'</tbody></table>';
}

function toggleCard(id){
  if(openCardId===id){openCardId=null;}else{openCardId=id;}
  document.querySelectorAll('.card').forEach(c=>{
    c.classList.toggle('open', c.dataset.id===String(id));
  });
}

// Play/stop icons
const ICON_PLAY = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>`;
const ICON_STOP = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>`;

function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const filtered=PATTERNS.filter(p=>{
    if(activeGenre!=='all'&&p.genre!==activeGenre) return false;
    if(activeMoods.size){
      const tags=p.tags||[];let match=false;
      for(const m of activeMoods){
        if(m==='ab'&&p.sub){match=true;break;}
        if(tags.includes(m)){match=true;break;}
      }
      if(!match) return false;
    }
    if(q){
      const hay=(p.name+' '+p.genre+' '+(p.sub||'')+' '+Object.keys(p.inst).join(' ')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  document.getElementById('results-bar').textContent=
    filtered.length===PATTERNS.length
      ?`Все паттерны · ${filtered.length}`
      :`Найдено: ${filtered.length} из ${PATTERNS.length}`;

  const container=document.getElementById('patterns');
  if(!filtered.length){
    container.innerHTML='<div class="empty"><span>◾</span>Паттерны не найдены</div>';
    return;
  }

  // find real index in PATTERNS for each filtered item
  container.innerHTML=filtered.map(p=>{
    const id=PATTERNS.indexOf(p);
    const instKeys=Object.keys(p.inst).join(' · ');
    const isOpen=openCardId===id;
    const isPlaying=playingCardId===id;

    const dots=Array.from({length:16},(_,i)=>
      `<div class="step-dot${i%4===0?' bar':''}${isPlaying&&currentStep===i?' active':''}"></div>`
    ).join('');

    return `<div class="card${isOpen?' open':''}" data-id="${id}">
      <div class="card-head" onclick="toggleCard(${id})">
        <div class="card-left">
          <div class="card-name">${p.name}${p.sub?` <span style="color:var(--text3);font-weight:400;font-size:11px">(${p.sub})</span>`:''}</div>
          <div class="card-sub">${instKeys}</div>
        </div>
        <span class="genre-badge">${p.genre}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="card-body">
        <div class="player">
          <button class="play-btn${isPlaying?' playing':''}" onclick="togglePlay(${id},event)" title="Play/Stop">
            ${isPlaying?ICON_STOP:ICON_PLAY}
          </button>
          <div class="step-indicators">${dots}</div>
        </div>
        <div class="drum-grid-wrap">${drawGrid(p.inst)}</div>
        <div class="card-tags">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

render();

    navigator.serviceWorker.register('sw.js').catch(()=>{});
